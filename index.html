<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#ff69b4">
    <title>🍬 糖果数学消消乐 · 最终完美版</title>
    <style>
        /* ===== 糖果可爱风 ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Neue', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(145deg, #fff0f5, #ffe4e1, #fff0e0);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: clamp(8px, 2vw, 16px);
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: clamp(40px, 8vw, 80px) clamp(40px, 8vw, 80px) clamp(20px, 4vw, 40px) clamp(20px, 4vw, 40px);
            box-shadow: 0 clamp(10px, 2vw, 20px) 0 #ffb6c1, 0 clamp(15px, 3vw, 30px) clamp(20px, 4vw, 40px) rgba(255, 105, 180, 0.3);
            padding: clamp(20px, 4vw, 30px) clamp(15px, 3vw, 25px);
            border: 3px solid white;
            position: relative;
        }

        /* ===== 用户信息栏 ===== */
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: clamp(15px, 3vw, 20px);
            padding: clamp(8px, 1.5vw, 10px) clamp(15px, 3vw, 20px);
            background: #fff0f5;
            border-radius: clamp(30px, 6vw, 50px);
            border: 2px solid #ffb6c1;
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #ff69b4;
            flex-wrap: wrap;
            gap: 10px;
        }

        @media (max-width: 500px) {
            .user-bar {
                flex-direction: column;
                text-align: center;
            }
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: clamp(8px, 1.5vw, 12px);
        }

        .user-avatar {
            width: clamp(40px, 8vw, 50px);
            height: clamp(40px, 8vw, 50px);
            border-radius: 50%;
            background: linear-gradient(145deg, #ff69b4, #ff1493);
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            color: white;
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #8b008b;
        }

        .user-details {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: bold;
            font-size: clamp(1rem, 3vw, 1.2rem);
            color: #ff1493;
        }

        .user-status {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            color: #666;
        }

        .auth-buttons {
            display: flex;
            gap: clamp(5px, 1vw, 10px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .auth-btn {
            padding: clamp(6px, 1.5vw, 8px) clamp(15px, 3vw, 20px);
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid white;
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #8b008b;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
        }

        .auth-btn.login {
            background: linear-gradient(145deg, #ff69b4, #ff1493);
            color: white;
        }

        .auth-btn.register {
            background: linear-gradient(145deg, #ffd700, #ffa500);
            color: white;
        }

        .auth-btn.logout {
            background: linear-gradient(145deg, #ff6b6b, #ff4757);
            color: white;
        }

        .auth-btn:active {
            transform: translateY(3px);
            box-shadow: 0 clamp(1px, 0.3vw, 2px) 0 #8b008b;
        }

        /* ===== 语言切换 ===== */
        .language-switch {
            position: absolute;
            top: clamp(10px, 2vw, 20px);
            right: clamp(15px, 3vw, 30px);
            z-index: 100;
        }

        .lang-btn {
            padding: clamp(6px, 1.5vw, 8px) clamp(15px, 3vw, 20px);
            border: none;
            border-radius: 40px;
            background: linear-gradient(145deg, #9b59b6, #8e44ad);
            color: white;
            font-size: clamp(0.9rem, 2.5vw, 1rem);
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #6c3483;
            border: 2px solid white;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .lang-btn:active {
            transform: translateY(3px);
            box-shadow: 0 clamp(1px, 0.3vw, 2px) 0 #6c3483;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: clamp(15px, 3vw, 25px);
            margin-top: clamp(10px, 2vw, 20px);
        }

        h1 {
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            background: linear-gradient(145deg, #ff69b4, #ff1493, #ff4500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 2px 2px 0 #ffff00, 3px 3px 0 rgba(255, 20, 147, 0.3);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .candy-row {
            font-size: clamp(1.5rem, 4vw, 2rem);
            display: flex;
            justify-content: center;
            gap: clamp(10px, 2vw, 15px);
        }

        .candy {
            animation: bounce 2s infinite;
        }

        .candy:nth-child(2) { animation-delay: 0.2s; }
        .candy:nth-child(3) { animation-delay: 0.4s; }
        .candy:nth-child(4) { animation-delay: 0.6s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        /* ===== 游戏设置区域 ===== */
        .settings-panel {
            background: #fff5f5;
            border: 3px solid #ffb6c1;
            border-radius: 50px;
            padding: clamp(15px, 3vw, 20px);
            margin-bottom: clamp(15px, 3vw, 25px);
            box-shadow: 0 clamp(4px, 1vw, 8px) 0 #ff69b4;
        }

        .mode-row, .difficulty-row {
            display: flex;
            gap: clamp(8px, 1.5vw, 12px);
            margin-bottom: clamp(10px, 2vw, 15px);
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn, .difficulty-btn {
            padding: clamp(8px, 2vw, 12px) clamp(15px, 3vw, 25px);
            border: none;
            border-radius: 40px;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #ffb6c1;
            flex: 1;
            min-width: clamp(100px, 20vw, 140px);
            min-height: clamp(40px, 8vw, 50px);
        }

        .mode-btn {
            background: white;
            color: #ff69b4;
            border: 3px solid #ffb6c1;
        }

        .mode-btn.active {
            background: linear-gradient(145deg, #ff69b4, #ff1493);
            color: white;
            border-color: white;
            box-shadow: 0 clamp(3px, 0.8vw, 6px) 0 #8b008b;
            transform: translateY(-2px);
        }

        .difficulty-btn {
            background: white;
            color: #666;
            border: 2px solid #ddd;
        }

        .difficulty-btn.easy.active {
            background: #6ab04c;
            color: white;
            border-color: white;
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #2e7d32;
        }

        .difficulty-btn.medium.active {
            background: #ffb347;
            color: white;
            border-color: white;
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #ff8c00;
        }

        .difficulty-btn.hard.active {
            background: #ff6b6b;
            color: white;
            border-color: white;
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #c0392b;
        }

        .start-btn-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 10px;
        }

        .start-btn {
            padding: clamp(12px, 3vw, 18px) clamp(30px, 8vw, 50px);
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            background: linear-gradient(145deg, #ff69b4, #ff1493);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 0 #8b008b;
            cursor: pointer;
            box-shadow: 0 clamp(5px, 1.5vw, 10px) 0 #8b008b;
            transition: all 0.1s ease;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            border: 3px solid white;
            min-height: clamp(50px, 10vw, 70px);
        }

        .start-btn:active {
            transform: translateY(6px);
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #8b008b;
        }

        /* ===== 游戏信息卡片 ===== */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(8px, 1.5vw, 12px);
            background: #fff0f5;
            border: 3px solid #ffb6c1;
            border-radius: 50px;
            padding: clamp(12px, 2.5vw, 20px) clamp(10px, 2vw, 15px);
            margin-bottom: clamp(15px, 3vw, 25px);
            box-shadow: 0 clamp(4px, 1vw, 8px) 0 #ff69b4;
        }

        @media (max-width: 500px) {
            .stats-panel {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .stat-item {
            text-align: center;
        }

        .stat-label {
            font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            color: #ff1493;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 900;
            color: #8b008b;
            line-height: 1.2;
            text-shadow: 1px 1px 0 #ffff00;
        }

        /* ===== 目标和 ===== */
        .target-box {
            background: radial-gradient(circle at 30% 30%, #ffd700, #ffa500, #ff8c00);
            width: clamp(100px, 25vw, 140px);
            height: clamp(100px, 25vw, 140px);
            border-radius: 50%;
            margin: 0 auto clamp(15px, 3vw, 25px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 5px solid white;
            box-shadow: 0 clamp(6px, 1.5vw, 12px) 0 #ff8c00;
            position: relative;
        }

        .target-box::before {
            content: '🎯';
            position: absolute;
            top: -20px;
            left: -20px;
            font-size: clamp(1.5rem, 4vw, 2rem);
            transform: rotate(-20deg);
        }

        .target-box::after {
            content: '🍬';
            position: absolute;
            bottom: -20px;
            right: -20px;
            font-size: clamp(1.5rem, 4vw, 2rem);
            transform: rotate(20deg);
        }

        .target-label {
            color: white;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            text-shadow: 2px 2px 0 #ff4500;
        }

        .target-number {
            color: white;
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 900;
            line-height: 1;
            text-shadow: 4px 4px 0 #ff4500;
        }

        /* ===== 游戏网格 ===== */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: clamp(8px, 1.5vw, 12px);
            margin: clamp(15px, 3vw, 20px) 0 clamp(20px, 4vw, 30px);
            padding: clamp(10px, 2vw, 15px);
            background: #fff0f5;
            border-radius: clamp(30px, 6vw, 60px);
            border: 3px dashed #ffb6c1;
        }

        @media (max-width: 900px) {
            .game-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 600px) {
            .game-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 400px) {
            .game-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .number-card {
            aspect-ratio: 1;
            min-width: clamp(50px, 12vw, 80px);
            min-height: clamp(50px, 12vw, 80px);
            border: 3px solid white;
            border-radius: clamp(15px, 3vw, 25px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1.5rem, 5vw, 2.3rem);
            font-weight: 800;
            color: white;
            text-shadow: 2px 2px 0 #000000, 3px 3px 0 rgba(0,0,0,0.5);
            box-shadow: 0 clamp(4px, 1vw, 8px) 0 rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .number-card[data-color="0"] { background: radial-gradient(circle at 30% 30%, #ff9a9e, #fad0c4); }
        .number-card[data-color="1"] { background: radial-gradient(circle at 30% 30%, #a8edea, #fed6e3); }
        .number-card[data-color="2"] { background: radial-gradient(circle at 30% 30%, #ffd3b6, #ffaaa5); }
        .number-card[data-color="3"] { background: radial-gradient(circle at 30% 30%, #d4fc79, #96e6a1); }
        .number-card[data-color="4"] { background: radial-gradient(circle at 30% 30%, #84fab0, #8fd3f4); }
        .number-card[data-color="5"] { background: radial-gradient(circle at 30% 30%, #fccb90, #ff9a9e); }
        .number-card[data-color="6"] { background: radial-gradient(circle at 30% 30%, #fbc2eb, #a6c1ee); }
        .number-card[data-color="7"] { background: radial-gradient(circle at 30% 30%, #ff9a9e, #ffb6c1); }
        .number-card[data-color="8"] { background: radial-gradient(circle at 30% 30%, #ffd1d1, #ffb8b8); }
        .number-card[data-color="9"] { background: radial-gradient(circle at 30% 30%, #b2f0e5, #8ed6ff); }

        .number-card.selected {
            transform: scale(1.08);
            border: 4px solid #ffff00;
            box-shadow: 0 clamp(6px, 1.5vw, 10px) 0 rgba(0,0,0,0.2);
        }

        .number-card.matched {
            animation: candyPop 0.4s forwards;
        }

        @keyframes candyPop {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* ===== 控制按钮 ===== */
        .controls {
            display: flex;
            gap: clamp(8px, 1.5vw, 15px);
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .candy-btn {
            padding: clamp(10px, 2.5vw, 14px) clamp(15px, 4vw, 30px);
            border: none;
            border-radius: 50px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 #8b008b;
            cursor: pointer;
            transition: all 0.1s ease;
            box-shadow: 0 clamp(3px, 0.8vw, 6px) 0 #8b008b;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 2px solid white;
            min-width: clamp(100px, 20vw, 120px);
            min-height: clamp(45px, 10vw, 60px);
            justify-content: center;
        }

        .candy-btn:active {
            transform: translateY(4px);
            box-shadow: 0 clamp(1px, 0.3vw, 2px) 0 #8b008b;
        }

        .candy-btn.primary { background: linear-gradient(145deg, #ff69b4, #ff1493); }
        .candy-btn.secondary { background: linear-gradient(145deg, #ffd700, #ffa500); }
        .candy-btn.warning { background: linear-gradient(145deg, #ff6b6b, #ff4757); }
        .candy-btn.home { background: linear-gradient(145deg, #9b59b6, #8e44ad); }
        .candy-btn.pause { background: linear-gradient(145deg, #00cec9, #00b894); }

        /* ===== 反馈消息 ===== */
        .feedback {
            text-align: center;
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            margin: 15px 0;
            min-height: 70px;
            font-weight: bold;
            transition: all 0.2s ease;
            text-shadow: 2px 2px 0 white;
        }

        /* ===== 游戏结束弹窗 ===== */
        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 16px;
        }

        .game-over-card {
            background: white;
            border-radius: clamp(40px, 8vw, 80px);
            padding: clamp(20px, 5vw, 35px);
            max-width: 500px;
            width: 90%;
            border: 4px solid #ff69b4;
            box-shadow: 0 clamp(10px, 2vw, 20px) 0 #ff1493;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: clamp(10px, 2vw, 20px);
            right: clamp(10px, 2vw, 20px);
            width: clamp(30px, 6vw, 40px);
            height: clamp(30px, 6vw, 40px);
            border-radius: 50%;
            background: #ff6b6b;
            border: 2px solid white;
            color: white;
            font-size: clamp(1.2rem, 4vw, 1.5rem);
            cursor: pointer;
            box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 #c0392b;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:active {
            transform: translateY(3px);
            box-shadow: 0 clamp(1px, 0.3vw, 2px) 0 #c0392b;
        }

        .game-over-title {
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            color: #ff69b4;
            margin-bottom: 25px;
            text-shadow: 2px 2px 0 #ffff00;
        }

        .result-item {
            font-size: clamp(1.1rem, 3.5vw, 1.3rem);
            margin: 15px 0;
            padding: 10px;
            background: #fff0f5;
            border-radius: 40px;
            border: 2px solid #ffb6c1;
        }

        .result-value {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 900;
            color: #ff1493;
            margin-left: 10px;
        }

        .game-over-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        /* ===== 登录模态框 ===== */
        .auth-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 16px;
        }

        .auth-card {
            background: white;
            border-radius: 60px;
            padding: clamp(20px, 5vw, 40px);
            max-width: 400px;
            width: 90%;
            border: 4px solid #ff69b4;
            box-shadow: 0 20px 0 #ff1493;
            position: relative;
        }

        .auth-title {
            font-size: clamp(1.5rem, 5vw, 2rem);
            color: #ff69b4;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 2px 2px 0 #ffff00;
        }

        .auth-input {
            width: 100%;
            padding: clamp(12px, 3vw, 15px) clamp(15px, 3vw, 20px);
            margin: 10px 0;
            border: 3px solid #ffb6c1;
            border-radius: 40px;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            font-family: inherit;
        }

        .auth-input:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 0 3px #ffff00;
        }

        .auth-error {
            color: #ff4444;
            text-align: center;
            margin: 10px 0;
            min-height: 30px;
            font-weight: bold;
        }

        .auth-switch {
            text-align: center;
            margin: 20px 0 10px;
            color: #666;
        }

        .auth-switch span {
            color: #ff69b4;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
        }

        .auth-submit-btn {
            width: 100%;
            font-size: 1.2rem;
            padding: 12px 30px;
            margin-top: 10px;
        }

        /* ===== 新手引导 - 纯图标版 ===== */
        .tutorial-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            padding: 16px;
        }

        .tutorial-card {
            background: white;
            border-radius: clamp(30px, 6vw, 60px);
            padding: clamp(20px, 4vw, 30px);
            max-width: min(500px, 90%);
            width: 100%;
            border: 4px solid #ff69b4;
            box-shadow: 0 clamp(10px, 2vw, 20px) 0 #ff1493;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: clamp(8px, 2vw, 12px);
            margin: clamp(10px, 2vw, 15px) 0;
        }

        .step-dot {
            width: clamp(8px, 2vw, 10px);
            height: clamp(8px, 2vw, 10px);
            border-radius: 50%;
            background: #ffb6c1;
            transition: all 0.3s;
        }

        .step-dot.active {
            width: clamp(20px, 4vw, 25px);
            background: #ff69b4;
            border-radius: 10px;
        }

        .step-container {
            min-height: clamp(180px, 40vw, 220px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .step {
            width: 100%;
            text-align: center;
        }

        .demo-row {
            display: flex;
            align-items: center;
            justify-content: center;

                        practice: { timeLimit: null, targetCount: null }
                    };

                    // 颜色索引
                    this.colorIndex = 0;

                    // 存储事件处理函数引用
                    this.boundHandlers = {
                        closeGameover: () => this.closeModal('game-over-modal'),
                        closeAuth: () => this.closeModal('auth-modal'),
                        closeTutorial: () => this.closeModal('tutorial-modal'),
                        authModalClick: (e) => {
                            if (e.target === document.getElementById('auth-modal')) {
                                this.closeModal('auth-modal');
                            }
                        },
                        gameoverModalClick: (e) => {
                            if (e.target === document.getElementById('game-over-modal')) {
                                this.closeModal('game-over-modal');
                            }
                        },
                        tutorialModalClick: (e) => {
                            if (e.target === document.getElementById('tutorial-modal')) {
                                this.closeModal('tutorial-modal');
                            }
                        }
                    };

                    // 绑定所有方法
                    this.toggleLanguage = this.toggleLanguage.bind(this);
                    this.switchMode = this.switchMode.bind(this);
                    this.switchDifficulty = this.switchDifficulty.bind(this);
                    this.startGame = this.startGame.bind(this);
                    this.showHint = this.showHint.bind(this);
                    this.refreshGrid = this.refreshGrid.bind(this);
                    this.togglePause = this.togglePause.bind(this);
                    this.endGame = this.endGame.bind(this);
                    this.goHome = this.goHome.bind(this);
                    this.restart = this.restart.bind(this);
                    this.exportData = this.exportData.bind(this);
                    this.handleCardClick = this.handleCardClick.bind(this);
                    this.handleNetworkOnline = this.handleNetworkOnline.bind(this);
                    this.handleNetworkOffline = this.handleNetworkOffline.bind(this);
                    this.handleKeydown = this.handleKeydown.bind(this);
                    this.showAuthModal = this.showAuthModal.bind(this);
                    this.handleAuth = this.handleAuth.bind(this);
                    this.logout = this.logout.bind(this);
                    this.saveLocalData = this.throttle(this.saveLocalData.bind(this), 1000);
                    this.updateLanguage = this.updateLanguage.bind(this);
                    this.updateUserUI = this.updateUserUI.bind(this);
                    this.loadDifficulty = this.loadDifficulty.bind(this);
                    this.generateGrid = this.generateGrid.bind(this);
                    this.generateTarget = this.generateTarget.bind(this);
                    this.checkValidCombination = this.checkValidCombination.bind(this);
                    this.updateDisplay = this.updateDisplay.bind(this);
                    this.updateModeDisplay = this.updateModeDisplay.bind(this);
                    this.showFeedback = this.showFeedback.bind(this);
                    this.closeModal = this.closeModal.bind(this);
                    this.initSupabase = this.initSupabase.bind(this);
                    this.syncToCloud = this.syncToCloud.bind(this);
                    this.syncFromCloud = this.syncFromCloud.bind(this);
                    this.initTutorial = this.initTutorial.bind(this);
                    this.nextTutorialStep = this.nextTutorialStep.bind(this);
                    this.prevTutorialStep = this.prevTutorialStep.bind(this);
                    this.updateTutorialStep = this.updateTutorialStep.bind(this);
                    this.updateTutorialLanguage = this.updateTutorialLanguage.bind(this);
                    this.saveGuestGame = this.saveGuestGame.bind(this);

                    this.init();
                }

                // ===== 初始化 =====
                async init() {
                    try {
                        await this.initSupabase();
                        await this.loadLocalData();
                        this.loadUserSession();
                        this.bindEvents();
                        this.setupNetworkListeners();
                        this.loadDifficulty(this.state.currentDifficulty);
                        this.updateLanguage();
                        this.updateUserUI();
                        this.checkFirstTime();
                    } catch (error) {
                        console.error('初始化失败:', error);
                        this.showFeedback('errorOccurred', '#ff4444');
                    }
                }

                // ===== Supabase 初始化 =====
                async initSupabase() {
                    try {
                        if (!SUPABASE_URL || !SUPABASE_ANON_KEY || 
                            SUPABASE_URL === 'SUPABASE_URL_PLACEHOLDER' || 
                            SUPABASE_ANON_KEY === 'SUPABASE_ANON_KEY_PLACEHOLDER') {
                            console.warn('Supabase 环境变量未配置，将使用本地模式');
                            return;
                        }

                        this.state.supabase = window.supabase.createClient(
                            SUPABASE_URL,
                            SUPABASE_ANON_KEY,
                            {
                                auth: {
                                    autoRefreshToken: true,
                                    persistSession: true
                                }
                            }
                        );

                        const { error } = await this.state.supabase.auth.getSession();
                        if (error) throw error;

                        this.state.supabaseReady = true;
                        console.log('Supabase 连接成功');
                    } catch (error) {
                        console.error('Supabase 初始化失败:', error);
                        this.state.supabaseReady = false;
                    }
                }

                // ===== 保存游客游戏记录 =====
                saveGuestGame() {
                    try {
                        const guestGames = JSON.parse(localStorage.getItem(STORAGE_KEYS.GUEST_GAMES) || '[]');
                        const accuracy = this.state.attempts > 0
                            ? Math.round((this.state.correct / this.state.attempts) * 100)
                            : 0;
                        
                        guestGames.unshift({
                            score: this.state.score,
                            completed: this.state.completed,
                            accuracy: accuracy,
                            mode: this.state.currentMode,
                            difficulty: this.state.currentDifficulty,
                            timestamp: new Date().toISOString()
                        });

                        if (guestGames.length > 20) {
                            guestGames.pop();
                        }

                        localStorage.setItem(STORAGE_KEYS.GUEST_GAMES, JSON.stringify(guestGames));
                    } catch (e) {
                        console.warn('保存游客记录失败:', e);
                    }
                }

                // ===== 新手引导 =====
                initTutorial() {
                    const prevBtn = document.getElementById('prev-step');
                    const nextBtn = document.getElementById('next-step');

                    if (prevBtn) {
                        prevBtn.removeEventListener('click', this.prevTutorialStep);
                        prevBtn.addEventListener('click', this.prevTutorialStep);
                    }
                    if (nextBtn) {
                        nextBtn.removeEventListener('click', this.nextTutorialStep);
                        nextBtn.addEventListener('click', this.nextTutorialStep);
                    }

                    const dontShow = document.getElementById('dont-show-tutorial');
                    if (dontShow) {
                        dontShow.removeEventListener('change', this.handleDontShow);
                        dontShow.addEventListener('change', (e) => {
                            if (e.target.checked) {
                                localStorage.setItem(STORAGE_KEYS.HAS_PLAYED, 'true');
                            }
                        });
                    }

                    this.updateTutorialStep(1);
                }

                nextTutorialStep() {
                    if (this.state.tutorialStep < this.state.totalSteps) {
                        this.updateTutorialStep(this.state.tutorialStep + 1);
                    } else {
                        this.closeModal('tutorial-modal');
                    }
                }

                prevTutorialStep() {
                    if (this.state.tutorialStep > 1) {
                        this.updateTutorialStep(this.state.tutorialStep - 1);
                    }
                }

                updateTutorialStep(step) {
                    this.state.tutorialStep = step;
                    
                    const steps = document.querySelectorAll('.step');
                    const dots = document.querySelectorAll('.step-dot');
                    const prevBtn = document.getElementById('prev-step');
                    const nextBtn = document.getElementById('next-step');
                    const stepText = document.getElementById('step-text');

                    steps.forEach((s, i) => {
                        if (s) {
                            s.style.display = i + 1 === step ? 'block' : 'none';
                        }
                    });

                    dots.forEach((d, i) => {
                        if (d) {
                            if (i + 1 === step) {
                                d.classList.add('active');
                            } else {
                                d.classList.remove('active');
                            }
                        }
                    });

                    if (prevBtn) {
                        prevBtn.style.visibility = step === 1 ? 'hidden' : 'visible';
                    }

                    if (nextBtn) {
                        nextBtn.innerHTML = step === this.state.totalSteps ? '✓' : '▶';
                    }

                    if (stepText) {
                        stepText.textContent = `${step}/${this.state.totalSteps}`;
                    }
                }

                updateTutorialLanguage() {
                    const lang = TRANSLATIONS[this.state.currentLang];
                    const hint1 = document.getElementById('step1-hint');
                    const hint2 = document.getElementById('step2-hint');
                    const hint3 = document.getElementById('step3-hint');
                    const dontShowLabel = document.getElementById('dont-show-label');
                    const noMatchText = document.getElementById('no-match-text');

                    if (hint1) hint1.innerHTML = `⭐ ${lang.tutorial1}`;
                    if (hint2) hint2.innerHTML = `⭐ ${lang.tutorial2}`;
                    if (hint3) hint3.innerHTML = `⭐ ${lang.tutorial3}`;
                    if (dontShowLabel) dontShowLabel.textContent = lang.dontShow;
                    if (noMatchText) noMatchText.textContent = `${lang.noMatch} 8`;
                }

                checkFirstTime() {
                    const hasPlayed = localStorage.getItem(STORAGE_KEYS.HAS_PLAYED);
                    if (!hasPlayed) {
                        const tutorialModal = document.getElementById('tutorial-modal');
                        if (tutorialModal) {
                            tutorialModal.style.display = 'flex';
                            this.initTutorial();
                            this.updateTutorialLanguage();
                        }
                    }
                }

                // ===== 云端同步 =====
                async syncToCloud() {
                    if (!this.state.supabaseReady || !this.state.currentUser || !this.state.isOnline) {
                        return false;
                    }

                    try {
                        const accuracy = this.state.attempts > 0
                            ? Math.round((this.state.correct / this.state.attempts) * 100)
                            : 0;

                        // 使用新的表名
                        const { error: gameError } = await this.state.supabase
                            .from('candy_math_game_records')
                            .insert([{
                                user_id: this.state.currentUser.id,
                                score: this.state.score,
                                completed: this.state.completed,
                                accuracy: accuracy,
                                mode: this.state.currentMode,
                                difficulty: this.state.currentDifficulty,
                                created_at: new Date().toISOString()
                            }]);

                        if (gameError) throw gameError;

                        if (this.state.wrongQuestions.length > 0) {
                            const wrongRecords = this.state.wrongQuestions.map(w => ({
                                user_id: this.state.currentUser.id,
                                target: w.target,
                                num1: w.num1,
                                num2: w.num2,
                                created_at: w.timestamp
                            }));

                            const { error: wrongError } = await this.state.supabase
                                .from('candy_math_wrong_questions')
                                .insert(wrongRecords);

                            if (wrongError) throw wrongError;
                        }

                        this.showFeedback('syncSuccess', '#4CAF50');
                        return true;
                    } catch (error) {
                        console.error('同步失败:', error);
                        this.showFeedback('syncFailed', '#ff4444');
                        return false;
                    }
                }

                async syncFromCloud() {
                    if (!this.state.supabaseReady || !this.state.currentUser || !this.state.isOnline) {
                        return false;
                    }

                    try {
                        const { data: wrong, error: wrongError } = await this.state.supabase
                            .from('candy_math_wrong_questions')
                            .select('*')
                            .eq('user_id', this.state.currentUser.id)
                            .order('created_at', { ascending: false })
                            .limit(200);

                        if (wrongError) throw wrongError;

                        if (wrong && wrong.length > 0) {
                            this.state.wrongQuestions = wrong.map(w => ({
                                target: w.target,
                                num1: w.num1,
                                num2: w.num2,
                                timestamp: w.created_at
                            }));
                        }

                        this.showFeedback('syncSuccess', '#4CAF50');
                        return true;
                    } catch (error) {
                        console.error('拉取失败:', error);
                        this.showFeedback('syncFailed', '#ff4444');
                        return false;
                    }
                }

                // ===== 关闭模态框 =====

                    const modal = document.getElementById(modalId);
                    if (modal) modal.style.display = 'none';
                }

                        btn.removeEventListener('click', this.switchDifficulty);
                        btn.addEventListener('click', this.switchDifficulty);
                    });

                        startBtn.removeEventListener('click', this.startGame);
                        startBtn.addEventListener('click', this.startGame);
                    }

                    const hintBtn = document.getElementById('hint-btn');
                    if (hintBtn) {
                        hintBtn.removeEventListener('click', this.showHint);
                        hintBtn.addEventListener('click', this.showHint);
                    }

                    const refreshBtn = document.getElementById('refresh-btn');
                    if (refreshBtn) {
                        refreshBtn.removeEventListener('click', this.refreshGrid);
                        refreshBtn.addEventListener('click', this.refreshGrid);
                    }

                    const pauseBtn = document.getElementById('pause-btn');

                    }

                    const homeFromGameoverBtn = document.getElementById('home-from-gameover-btn');
                    if (homeFromGameoverBtn) {
                        homeFromGameoverBtn.removeEventListener('click', this.goHome);
                        homeFromGameoverBtn.addEventListener('click', this.goHome);
                    }

                    const playAgainBtn = document.getElementById('play-again-btn');
                    if (playAgainBtn) {
                        playAgainBtn.removeEventListener('click', this.restart);
                        playAgainBtn.addEventListener('click', this.restart);
                    }

                    const exportBtn = document.getElementById('export-data-btn');
                    if (exportBtn) {
                        exportBtn.removeEventListener('click', this.exportData);
                        exportBtn.addEventListener('click', this.exportData);
                    }

                    const closeGameover = document.getElementById('close-gameover');
                    if (closeGameover) {
                        closeGameover.removeEventListener('click', this.boundHandlers.closeGameover);
                        closeGameover.addEventListener('click', this.boundHandlers.closeGameover);
                    }

                    const closeAuth = document.getElementById('close-auth');
                    if (closeAuth) {
                        closeAuth.removeEventListener('click', this.boundHandlers.closeAuth);
                        closeAuth.addEventListener('click', this.boundHandlers.closeAuth);
                    }

                    const closeTutorial = document.getElementById('close-tutorial');
                    if (closeTutorial) {
                        closeTutorial.removeEventListener('click', this.boundHandlers.closeTutorial);
                        closeTutorial.addEventListener('click', this.boundHandlers.closeTutorial);
                    }

                    const gameGrid = document.getElementById('game-grid');
                    if (gameGrid) {
                        gameGrid.removeEventListener('click', this.handleCardClick);
                        gameGrid.addEventListener('click', this.handleCardClick);
                    }

                    document.removeEventListener('keydown', this.handleKeydown);
                    document.addEventListener('keydown', this.handleKeydown);

                    const authModal = document.getElementById('auth-modal');
                    if (authModal) {
                        authModal.removeEventListener('click', this.boundHandlers.authModalClick);
                        authModal.addEventListener('click', this.boundHandlers.authModalClick);
                    }

                    const gameoverModal = document.getElementById('game-over-modal');
                    if (gameoverModal) {
                        gameoverModal.removeEventListener('click', this.boundHandlers.gameoverModalClick);
                        gameoverModal.addEventListener('click', this.boundHandlers.gameoverModalClick);
                    }

                    const tutorialModal = document.getElementById('tutorial-modal');
                    if (tutorialModal) {

                        tutorialModal.addEventListener('click', this.boundHandlers.tutorialModalClick);
