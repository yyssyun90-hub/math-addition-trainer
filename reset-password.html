<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - 糖果数学消消乐</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Neue', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .reset-container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 60px;
            padding: 40px 30px;
            border: 4px solid #ff69b4;
            box-shadow: 0 20px 0 #ff1493;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            color: #ff69b4;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #ffff00;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            color: #ff1493;
            margin-bottom: 8px;
            margin-left: 10px;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border: 3px solid #ffb6c1;
            border-radius: 40px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #ff69b4;
            box-shadow: 0 0 0 3px #ffff00;
        }

        .password-requirements {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
            margin-left: 10px;
        }

        button {
            width: 100%;
            padding: 15px 30px;
            font-size: 1.2rem;
            background: linear-gradient(145deg, #ff69b4, #ff1493);
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: bold;
            text-shadow: 2px 2px 0 #8b008b;
            cursor: pointer;
            box-shadow: 0 6px 0 #8b008b;
            transition: all 0.1s ease;
            border: 3px solid white;
            margin: 20px 0 10px;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8b008b;
        }

        button:disabled {
            opacity: 0.6;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #8b008b;
            cursor: not-allowed;
        }

        .message {
            min-height: 50px;
            padding: 10px;
            border-radius: 30px;
            font-weight: bold;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #ff69b4;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        .candy-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
    <!-- 加载 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Supabase 配置 -->
    <script id="supabase-config" type="application/json">
        {
            "supabaseUrl": "https://zykqddnckhcivutcropm.supabase.co",
            "supabaseKey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp5a3FkZG5ja2hjaXZ1dGNyb3BtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NjQwNjIsImV4cCI6MjA4NzU0MDA2Mn0.hc3aROjGSUaAt7Jlcf3qqY4XeVSiKpwIxS8LHQ2LFOk"
        }
    </script>
</head>
<body>
    <div class="reset-container">
        <div class="candy-icon">🍬🔑</div>
        <h1>重置密码</h1>
        <div class="subtitle">请输入您的新密码</div>

        <div class="input-group">
            <label for="new-password">新密码</label>
            <input type="password" id="new-password" placeholder="至少6位" minlength="6">
            <div class="password-requirements">至少6位字符</div>
        </div>

        <div class="input-group">
            <label for="confirm-password">确认新密码</label>
            <input type="password" id="confirm-password" placeholder="再次输入新密码" minlength="6">
        </div>

        <div class="message" id="message"></div>

        <button id="reset-btn">确认重置</button>

        <a href="/" class="back-link">← 返回游戏首页</a>
    </div>

    <script>
        // 简化的 AuthManager 用于密码重置
        class SimpleAuthManager {
            constructor() {
                this.supabase = null;
                this.game = { state: {} };
            }

            async initSupabase() {
                const configScript = document.getElementById('supabase-config');
                if (!configScript) return false;

                try {
                    const config = JSON.parse(configScript.textContent);
                    this.supabase = window.supabase.createClient(
                        config.supabaseUrl,
                        config.supabaseKey,
                        { auth: { autoRefreshToken: true, persistSession: true } }
                    );
                    
                    const { error } = await this.supabase.auth.getSession();
                    if (error) throw error;
                    
                    this.game.state.supabaseReady = true;
                    return true;
                } catch (error) {
                    console.error('Supabase 初始化失败:', error);
                    return false;
                }
            }

            validatePassword(password) {
                return password && password.length >= 6;
            }

            async handlePasswordReset(newPassword) {
                if (!this.supabase || !this.game.state.supabaseReady) {
                    throw new Error('Supabase 未连接');
                }

                if (!this.validatePassword(newPassword)) {
                    throw new Error('密码至少需要6位');
                }

                const { error } = await this.supabase.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;
                return true;
            }
        }

        // 页面逻辑
        const auth = new SimpleAuthManager();
        const messageEl = document.getElementById('message');
        const resetBtn = document.getElementById('reset-btn');
        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');

        // 初始化
        auth.initSupabase().then(success => {
            if (!success) {
                showMessage('Supabase 连接失败，请稍后重试', 'error');
            }
        });

        function showMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
        }

        resetBtn.addEventListener('click', async () => {
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // 验证输入
            if (!newPassword || !confirmPassword) {
                showMessage('请输入密码', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('密码至少需要6位', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            // 禁用按钮
            resetBtn.disabled = true;
            showMessage('处理中...', 'info');

            try {
                await auth.handlePasswordReset(newPassword);
                showMessage('密码重置成功！3秒后跳转到登录页', 'success');
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);
            } catch (error) {
                console.error('密码重置失败:', error);
                let errorMsg = '密码重置失败，请重试';
                
                if (error.message.includes('rate limit')) {
                    errorMsg = '操作过于频繁，请稍后再试';
                } else if (error.message.includes('expired')) {
                    errorMsg = '链接已过期，请重新发送重置邮件';
                }
                
                showMessage(errorMsg, 'error');
                resetBtn.disabled = false;
            }
        });

        // 回车键支持
        [newPasswordInput, confirmPasswordInput].forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    resetBtn.click();
                }
            });
        });
    </script>
</body>
</html>
